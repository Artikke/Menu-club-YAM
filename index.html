<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>PROESA - Menu Semanal</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&family=Inter:wght@300;400;500;600;700&display=swap');

:root {
  --bg: #f0f4f8;
  --card: #ffffff;
  --gold: #1a5276;
  --gold-light: #2980b9;
  --gold-dark: #0e6655;
  --teal: #0f9b8e;
  --teal-light: #1abc9c;
  --white: #1e1e1e;
  --muted: #7f8c8d;
  --green: #0f9b8e;
  --green-dark: #0e6655;
  --border: rgba(26,82,118,0.12);
  --shadow: 0 8px 32px rgba(26,82,118,0.1);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Inter', sans-serif;
  background: var(--bg);
  color: var(--white);
  min-height: 100vh;
}

.header {
  text-align: center;
  padding: 24px 20px 18px;
  background: linear-gradient(135deg, #1a5276 0%, #0f9b8e 100%);
  color: #fff;
}

.header-logo {
  width: 90px; height: 90px;
  margin: 0 auto 8px;
  background: #fff;
  border-radius: 18px;
  padding: 8px;
  box-shadow: 0 4px 20px rgba(0,0,0,0.15);
}

.header-logo img { width: 100%; height: 100%; object-fit: contain; border-radius: 10px; }

.header h1 {
  font-family: 'Montserrat', sans-serif;
  font-size: 1.8rem;
  color: #fff;
  letter-spacing: 3px;
  font-weight: 800;
}

.header h1 span { color: #fff; font-weight: 800; }

.header-sub {
  font-size: 0.8rem;
  color: rgba(255,255,255,0.85);
  letter-spacing: 4px;
  text-transform: uppercase;
  margin-top: 2px;
  font-weight: 500;
}

.menu-info {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 20px;
  margin-top: 15px;
  flex-wrap: wrap;
}

.menu-info .badge {
  background: rgba(255,255,255,0.2);
  border: 1px solid rgba(255,255,255,0.3);
  color: #fff;
  padding: 6px 16px;
  border-radius: 20px;
  font-size: 0.85rem;
  font-weight: 500;
}

.sync-status {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-size: 0.75rem;
  color: rgba(255,255,255,0.7);
  margin-top: 10px;
}

.sync-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: var(--green);
  display: inline-block;
}

.sync-dot.loading { background: var(--teal); animation: pulse 1s infinite; }
.sync-dot.error { background: #c0392b; }

@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

/* NOMBRE */
.nombre-section {
  max-width: 500px;
  margin: 20px auto;
  padding: 0 20px;
}

.nombre-section label {
  display: block;
  font-size: 0.8rem;
  color: var(--gold);
  text-transform: uppercase;
  letter-spacing: 2px;
  margin-bottom: 8px;
  text-align: center;
}

.nombre-section input {
  width: 100%;
  padding: 12px 18px;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 10px;
  color: var(--white);
  font-size: 1rem;
  font-family: 'Inter', sans-serif;
  text-align: center;
  transition: border-color 0.3s;
}

.nombre-section input:focus { outline: none; border-color: var(--gold); }
.nombre-section input::placeholder { color: var(--muted); }

/* MENU GRID */
.menu-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 20px;
  padding: 20px;
  max-width: 1300px;
  margin: 0 auto;
}

.day-card {
  background: var(--card);
  border-radius: 16px;
  overflow: hidden;
  border: 1px solid var(--border);
  transition: transform 0.2s, box-shadow 0.2s;
}

.day-card:hover { transform: translateY(-3px); box-shadow: var(--shadow); }

.day-header {
  background: linear-gradient(135deg, var(--gold), var(--teal));
  padding: 14px 20px;
  text-align: center;
}

.day-header h2 {
  font-family: 'Montserrat', sans-serif;
  font-size: 1.2rem;
  color: #fff;
  margin-bottom: 2px;
  font-weight: 700;
}

.day-header .date { font-size: 0.8rem; color: rgba(255,255,255,0.8); }

.meal-section {
  padding: 6px 18px;
  border-bottom: 1px solid var(--border);
}

.meal-section:last-of-type { border-bottom: none; }

.meal-type {
  font-size: 0.7rem;
  text-transform: uppercase;
  letter-spacing: 2px;
  color: var(--gold);
  margin-bottom: 4px;
  margin-top: 10px;
}

.meal-name {
  font-size: 0.95rem;
  color: var(--white);
  line-height: 1.4;
  margin-bottom: 4px;
}

.meal-complement { font-size: 0.8rem; color: var(--muted); margin-bottom: 6px; }

/* ALTERNATIVA SELECTOR */
.alt-section {
  padding: 10px 18px;
  background: rgba(15,155,142,0.04);
  border-top: 1px solid var(--border);
}

.alt-label {
  font-size: 0.7rem;
  text-transform: uppercase;
  letter-spacing: 2px;
  color: var(--gold);
  margin-bottom: 8px;
}

.alt-options { display: flex; flex-direction: column; gap: 6px; }

.alt-option {
  display: flex;
  align-items: center;
  gap: 8px;
  cursor: pointer;
  padding: 8px 12px;
  border-radius: 8px;
  border: 1px solid var(--border);
  background: var(--card);
  transition: border-color 0.2s, background 0.2s;
}

.alt-option:hover { border-color: var(--teal); }
.alt-option.selected { border-color: var(--teal); background: rgba(15,155,142,0.06); }

.alt-option input[type="radio"] { accent-color: var(--teal); }

.alt-option-text { font-size: 0.85rem; color: var(--white); }
.alt-option-text small { color: var(--muted); font-size: 0.75rem; }

/* ORDER ROW */
.day-order {
  padding: 14px 18px;
  background: rgba(26,82,118,0.03);
  border-top: 1px solid var(--border);
}

.order-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
}

.order-label { font-size: 0.85rem; color: var(--muted); }

.qty-control {
  display: flex;
  align-items: center;
  background: var(--bg);
  border-radius: 10px;
  overflow: hidden;
  border: 1px solid var(--border);
}

.qty-btn {
  width: 38px; height: 38px;
  border: none;
  background: transparent;
  color: var(--gold);
  font-size: 1.2rem;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background 0.2s;
  font-weight: 700;
}

.qty-btn:hover { background: rgba(15,155,142,0.1); }

.qty-value {
  width: 40px;
  text-align: center;
  font-size: 1.1rem;
  font-weight: 600;
  color: var(--white);
  border-left: 1px solid var(--border);
  border-right: 1px solid var(--border);
  padding: 6px 0;
}

.qty-value.active { color: var(--gold); }

.water-note {
  text-align: center;
  padding: 10px;
  color: var(--muted);
  font-size: 0.8rem;
  font-style: italic;
}

/* SUMMARY BAR */
.summary-bar {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  background: rgba(255,255,255,0.95);
  backdrop-filter: blur(15px);
  border-top: 1px solid var(--border);
  padding: 14px 20px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 20px;
  z-index: 100;
  transform: translateY(100%);
  transition: transform 0.3s ease;
  flex-wrap: wrap;
}

.summary-bar.visible { transform: translateY(0); }
.summary-total { font-size: 0.95rem; color: var(--white); }
.summary-total strong { color: var(--gold); }

.btn-send {
  background: linear-gradient(135deg, var(--gold), var(--teal));
  color: #fff; border: none;
  padding: 12px 30px; border-radius: 10px;
  font-size: 0.95rem; font-weight: 600;
  cursor: pointer; font-family: 'Inter', sans-serif;
  transition: transform 0.2s, box-shadow 0.2s;
}

.btn-send:hover { transform: scale(1.03); box-shadow: 0 4px 15px rgba(15,155,142,0.3); }

.btn-copy {
  background: transparent;
  color: var(--gold);
  border: 1px solid var(--gold);
  padding: 12px 24px; border-radius: 10px;
  font-size: 0.95rem; font-weight: 500;
  cursor: pointer; font-family: 'Inter', sans-serif;
}

/* MODAL */
.modal-bg {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.4);
  backdrop-filter: blur(5px);
  display: none;
  align-items: center; justify-content: center;
  z-index: 200; padding: 20px;
}

.modal-bg.open { display: flex; }

.modal {
  background: var(--card);
  border-radius: 20px;
  border: 1px solid var(--border);
  max-width: 500px; width: 100%;
  padding: 30px; text-align: center;
  box-shadow: 0 20px 60px rgba(0,0,0,0.15);
}

.modal h3 { font-family: 'Montserrat', sans-serif; color: var(--gold); font-size: 1.5rem; margin-bottom: 15px; font-weight: 700; }
.modal .check-icon { font-size: 3rem; margin-bottom: 10px; }

.modal .summary-text {
  text-align: left;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 18px;
  font-size: 0.85rem; line-height: 1.8;
  color: var(--white);
  margin: 15px 0;
  white-space: pre-line;
  max-height: 300px;
  overflow-y: auto;
}

.modal .btn-row { display: flex; gap: 10px; justify-content: center; margin-top: 18px; flex-wrap: wrap; }

.btn-whatsapp {
  background: #25d366; color: #fff; border: none;
  padding: 12px 24px; border-radius: 10px;
  font-size: 0.9rem; font-weight: 600;
  cursor: pointer; font-family: 'Inter', sans-serif;
  display: flex; align-items: center; gap: 8px;
  transition: background 0.2s;
}

.btn-whatsapp:hover { background: #1da851; }

.modal .btn-close {
  background: transparent;
  color: var(--muted);
  border: 1px solid var(--border);
  padding: 12px 24px; border-radius: 10px;
  font-size: 0.9rem; cursor: pointer;
  font-family: 'Inter', sans-serif;
}

/* PIN MODAL */
.pin-modal {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.4);
  backdrop-filter: blur(5px);
  display: none;
  align-items: center; justify-content: center;
  z-index: 250; padding: 20px;
}

.pin-modal.open { display: flex; }

.pin-box {
  background: var(--card);
  border-radius: 20px;
  border: 1px solid var(--border);
  max-width: 350px; width: 100%;
  padding: 30px; text-align: center;
  box-shadow: 0 20px 60px rgba(0,0,0,0.15);
}

.pin-box h3 { font-family: 'Montserrat', sans-serif; color: var(--gold); font-size: 1.3rem; margin-bottom: 5px; font-weight: 700; }
.pin-box p { color: var(--muted); font-size: 0.85rem; margin-bottom: 18px; }

.pin-box input {
  width: 100%; padding: 14px;
  background: var(--bg); border: 1px solid var(--border);
  border-radius: 10px; color: var(--white);
  font-size: 1.5rem; text-align: center;
  font-family: 'Inter', sans-serif;
  letter-spacing: 10px;
}

.pin-box input:focus { outline: none; border-color: var(--gold); }

.pin-box .pin-error { color: #c0392b; font-size: 0.8rem; margin-top: 8px; display: none; }

.pin-box .btn-row { display: flex; gap: 10px; justify-content: center; margin-top: 15px; }

/* ADMIN */
.admin-toggle { position: fixed; top: 15px; right: 15px; z-index: 50; }

.admin-toggle button {
  background: rgba(26,82,118,0.08);
  border: 1px solid var(--border);
  color: var(--gold);
  padding: 8px 16px; border-radius: 8px;
  font-size: 0.75rem; cursor: pointer;
  font-family: 'Inter', sans-serif;
  letter-spacing: 1px; text-transform: uppercase;
  font-weight: 600;
}

.admin-panel { display: none; max-width: 900px; margin: 20px auto; padding: 0 20px 100px; }
.admin-panel.visible { display: block; }
.admin-panel h3 { font-family: 'Montserrat', sans-serif; color: var(--gold); font-size: 1.3rem; margin-bottom: 15px; text-align: center; font-weight: 700; }

.admin-form-section {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 20px; margin-bottom: 20px;
}

.admin-form-section h4 {
  color: var(--gold); font-size: 0.9rem;
  text-transform: uppercase; letter-spacing: 2px;
  margin-bottom: 15px; text-align: center;
}

.form-row { display: flex; gap: 12px; margin-bottom: 12px; flex-wrap: wrap; }
.form-group { flex: 1; min-width: 120px; }

.form-group label {
  display: block; font-size: 0.7rem;
  color: var(--gold); text-transform: uppercase;
  letter-spacing: 1px; margin-bottom: 5px;
}

.form-group input, .form-group select {
  width: 100%; padding: 10px 14px;
  background: var(--bg); border: 1px solid var(--border);
  border-radius: 8px; color: var(--white);
  font-size: 0.9rem; font-family: 'Inter', sans-serif;
}

.form-group input:focus, .form-group select:focus { outline: none; border-color: var(--gold); }
.form-group input::placeholder { color: #aaa; }

.day-form-card {
  background: rgba(26,82,118,0.03);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 16px; margin-bottom: 15px;
}

.day-form-header {
  display: flex; align-items: center;
  justify-content: space-between;
  margin-bottom: 12px; padding-bottom: 8px;
  border-bottom: 1px solid var(--border);
}

.day-form-header h5 { font-family: 'Montserrat', sans-serif; color: var(--gold); font-size: 1.1rem; font-weight: 700; }

.btn-add-day {
  background: rgba(26,82,118,0.04);
  border: 1px dashed var(--gold);
  color: var(--gold);
  padding: 14px; border-radius: 12px;
  width: 100%; font-size: 0.9rem;
  cursor: pointer; font-family: 'Inter', sans-serif;
  margin-bottom: 15px;
}

.btn-remove-day {
  background: transparent; border: none;
  color: #c0392b; font-size: 1.2rem;
  cursor: pointer; padding: 4px 8px; border-radius: 6px;
}

.admin-btn-row { display: flex; gap: 10px; justify-content: center; margin-top: 15px; flex-wrap: wrap; }

.admin-btn {
  padding: 12px 28px; border-radius: 10px;
  font-size: 0.9rem; font-weight: 600;
  cursor: pointer; font-family: 'Inter', sans-serif;
  border: none; transition: transform 0.2s;
}

.admin-btn:hover { transform: scale(1.03); }
.admin-btn.save { background: linear-gradient(135deg, var(--gold), var(--teal)); color: #fff; }
.admin-btn.reset { background: transparent; color: var(--muted); border: 1px solid var(--border); }

/* ORDERS */
.orders-log { margin-top: 30px; }
.orders-log h3 { margin-bottom: 15px; }

.orders-table-wrap { overflow-x: auto; }

.orders-table {
  width: 100%; border-collapse: collapse;
  background: var(--card); border-radius: 12px;
  overflow: hidden; border: 1px solid var(--border);
  min-width: 500px;
}

.orders-table th {
  background: rgba(26,82,118,0.08);
  color: var(--gold); padding: 12px 14px;
  text-align: left; font-size: 0.7rem;
  text-transform: uppercase; letter-spacing: 1px;
  white-space: nowrap;
}

.orders-table td {
  padding: 10px 14px;
  border-bottom: 1px solid var(--border);
  font-size: 0.82rem; color: var(--white);
  white-space: nowrap;
}

.orders-table tr:last-child td { border-bottom: none; }
.orders-table .total-row { background: rgba(26,82,118,0.06); font-weight: 700; }

.no-orders { text-align: center; color: var(--muted); padding: 30px; font-size: 0.9rem; }

.btn-export {
  background: var(--green-dark); color: #fff; border: none;
  padding: 10px 24px; border-radius: 10px;
  font-size: 0.85rem; font-weight: 600;
  cursor: pointer; font-family: 'Inter', sans-serif;
}

.btn-clear-orders {
  background: #c0392b; color: #fff; border: none;
  padding: 10px 24px; border-radius: 10px;
  font-size: 0.85rem; font-weight: 600;
  cursor: pointer; font-family: 'Inter', sans-serif;
}

.toast {
  position: fixed; top: 20px; left: 50%;
  transform: translateX(-50%) translateY(-80px);
  background: var(--green); color: #fff;
  padding: 12px 24px; border-radius: 10px;
  font-size: 0.9rem; font-weight: 500;
  z-index: 300; transition: transform 0.3s ease;
  white-space: nowrap;
}

.toast.show { transform: translateX(-50%) translateY(0); }

@media (max-width: 600px) {
  .header h1 { font-size: 1.6rem; }
  .menu-grid { grid-template-columns: 1fr; padding: 15px; gap: 15px; }
  .summary-bar { flex-direction: column; gap: 10px; padding: 12px 15px; }
  .modal { padding: 20px; }
  .form-row { flex-direction: column; }
  .form-group { min-width: 100%; }
}

body { padding-bottom: 80px; }
</style>
</head>
<body>

<div class="toast" id="toast"></div>

<!-- PIN MODAL -->
<div class="pin-modal" id="pinModal">
  <div class="pin-box">
    <h3>Acceso Admin</h3>
    <p>Ingresa el PIN para administrar</p>
    <input type="password" id="pinInput" maxlength="4" placeholder="----" inputmode="numeric" />
    <div class="pin-error" id="pinError">PIN incorrecto</div>
    <div class="btn-row">
      <button class="btn-send" onclick="verificarPin()" style="padding:10px 30px;">Entrar</button>
      <button class="modal btn-close" onclick="cerrarPin()">Cancelar</button>
    </div>
  </div>
</div>

<!-- ADMIN TOGGLE -->
<div class="admin-toggle">
  <button onclick="abrirAdmin()">Admin</button>
</div>

// â”€â”€â”€ SYNC â”€â”€â”€
function setSyncStatus(s, m) {
  const el = document.getElementById('syncStatus');
  el.innerHTML = `<span class="sync-dot${s==='ok'?'':s==='loading'?' loading':' error'}"></span> ${m}`;
}

async function loadFromCloud() {
  setSyncStatus('loading', 'Cargando...');
  try {
    const r = await fetch(BIN_URL+'/latest', { headers: { 'X-Master-Key': API_KEY } });
    if (!r.ok) throw new Error(r.status);
    const d = (await r.json()).record;
    if (d?.menu?.dias) menuData = d.menu;
    if (Array.isArray(d?.orders)) ordersData = d.orders;
    setSyncStatus('ok', 'Sincronizado');
    return true;
  } catch(e) { setSyncStatus('error', 'Sin conexion'); return false; }
}

async function saveToCloud() {
  setSyncStatus('loading', 'Guardando...');
  try {
    const r = await fetch(BIN_URL, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json', 'X-Master-Key': API_KEY },
      body: JSON.stringify({ menu: menuData, orders: ordersData })
    });
    if (!r.ok) throw new Error(r.status);
    setSyncStatus('ok', 'Sincronizado');
    return true;
  } catch(e) { setSyncStatus('error', 'Error al guardar'); return false; }
}

function selectOption(i, opt) {
  selections[i] = opt;
  renderMenu();
}

function changeQty(i, d) {
  quantities[i] = Math.max(0, (quantities[i]||0) + d);
  const el = document.getElementById(`qty-${i}`);
  el.textContent = quantities[i];
  el.className = 'qty-value' + (quantities[i]>0?' active':'');
  updateSummary();
}

function updateSummary() {
  const total = Object.values(quantities).reduce((a,b)=>a+b, 0);
  const bar = document.getElementById('summaryBar');
  if (total > 0) {
    bar.classList.add('visible');
    const det = menuData.dias.map((d,i) => quantities[i]>0 ? `${d.dia}: ${quantities[i]}` : null).filter(Boolean).join(' | ');
    document.getElementById('summaryText').innerHTML = `<strong>${total}</strong> comida${total!==1?'s':''} &middot; ${det}`;
  } else {
    bar.classList.remove('visible');
  }
}

function buildResumen() {
  const nombre = document.getElementById('nombreInput').value.trim() || 'Sin nombre';
  const numEmp = document.getElementById('numEmpleado').value.trim();
  const total = Object.values(quantities).reduce((a,b)=>a+b, 0);
  let lines = [`PEDIDO - PROESA`, `Semana ${menuData.semana} de ${menuData.mes} ${menuData.anio}`, `Nombre: ${nombre}${numEmp ? ' (#' + numEmp + ')' : ''}`, `---`];

  menuData.dias.forEach((d, i) => {
    if (quantities[i] > 0) {
      const hasAlt = d.platoAlternativo && d.platoAlternativo.trim();
      const plato = hasAlt ? (selections[i]==='alternativa' ? d.platoAlternativo + ' (Alt)' : d.platoFuerte) : d.platoFuerte;
      lines.push(`${d.dia} ${d.fecha}: ${quantities[i]} comida${quantities[i]!==1?'s':''}`);
      lines.push(`  Entrada: ${d.entrada}`);
      lines.push(`  Plato: ${plato}${(!hasAlt && d.complemento) ? ' + ' + d.complemento : ''}`);
      lines.push(`  Postre: ${d.postre}`);
    }
  });

  lines.push(`---`, `Total: ${total} comida${total!==1?'s':''}`);
  return lines.join('\n');
}

function copiarResumen() {
  const n = document.getElementById('nombreInput').value.trim();
  if (!n) { showToast('Escribe tu nombre'); document.getElementById('nombreInput').focus(); return; }
  navigator.clipboard.writeText(buildResumen()).then(() => showToast('Copiado'));
}

async function enviarPedido() {
  const nombre = document.getElementById('nombreInput').value.trim();
  const numEmp = document.getElementById('numEmpleado').value.trim();
  if (!nombre) { showToast('Escribe tu nombre'); document.getElementById('nombreInput').focus(); return; }
  if (!numEmp) { showToast('Escribe tu numero de empleado'); document.getElementById('numEmpleado').focus(); return; }
  const total = Object.values(quantities).reduce((a,b)=>a+b, 0);
  if (total === 0) return;

  const order = { nombre, numEmpleado: numEmp, fecha: new Date().toISOString(), total, detalle: {}, opciones: {} };
  menuData.dias.forEach((d, i) => {
    if (quantities[i] > 0) {
      order.detalle[d.dia] = quantities[i];
      const hasAlt = d.platoAlternativo && d.platoAlternativo.trim();
      if (hasAlt) {
        order.opciones[d.dia] = selections[i]==='alternativa' ? d.platoAlternativo : d.platoFuerte;
      }
    }
  });

  ordersData.push(order);
  await saveToCloud();

  document.getElementById('modalSummary').textContent = buildResumen();
  document.getElementById('modalBg').classList.add('open');
  renderOrders();
}

async function guardarMenu() {
  const mes = document.getElementById('adminMes').value;
  const semana = parseInt(document.getElementById('adminSemana').value);
  const anio = parseInt(document.getElementById('adminAnio').value);
  const cards = document.querySelectorAll('.day-form-card');
  if (!cards.length) { showToast('Agrega al menos un dia'); return; }

  const dias = [];
  let valid = true;
  cards.forEach(card => {
    const dia = card.querySelector('.df-dia').value;
    const fecha = parseInt(card.querySelector('.df-fecha').value) || 1;
    const entrada = card.querySelector('.df-entrada').value.trim();
    const platoFuerte = card.querySelector('.df-plato').value.trim();
    const complemento = card.querySelector('.df-comp').value.trim();
    const platoAlternativo = card.querySelector('.df-alt').value.trim();
    const postre = card.querySelector('.df-postre').value.trim();
    if (!entrada || !platoFuerte || !postre) valid = false;
    dias.push({ dia, fecha, entrada, platoFuerte, complemento, platoAlternativo, postre });
  });

  if (!valid) { showToast('Llena los campos obligatorios'); return; }

  menuData = { mes, semana, anio, dias };
  ordersData = [];
  quantities = {};
  selections = {};

  const saved = await saveToCloud();
  showToast(saved ? 'Menu publicado' : 'Guardado local');
  renderMenu();
  renderOrders();
}

function enviarOrdenCocinera() {
  if (!ordersData.length) { showToast('No hay pedidos'); return; }

  const dayTotals = {};
  const dayOpciones = {};
  menuData.dias.forEach(d => { dayTotals[d.dia] = 0; dayOpciones[d.dia] = {}; });

  ordersData.forEach(o => {
    menuData.dias.forEach(d => {
      const qty = (o.detalle && o.detalle[d.dia]) || 0;
      dayTotals[d.dia] += qty;
      if (qty > 0 && o.opciones && o.opciones[d.dia]) {
        const opcion = o.opciones[d.dia];
        dayOpciones[d.dia][opcion] = (dayOpciones[d.dia][opcion] || 0) + qty;
      }
    });
  });

  const grandTotal = Object.values(dayTotals).reduce((a,b)=>a+b, 0);

  let msg = `*ORDEN PROESA - Semana ${menuData.semana}*\n`;
  msg += `${menuData.mes} ${menuData.anio}\n`;
  msg += `Total: ${grandTotal} comidas\n\n`;

  menuData.dias.forEach(d => {
    if (dayTotals[d.dia] > 0) {
      msg += `*${d.dia} ${d.fecha}*: ${dayTotals[d.dia]} comida${dayTotals[d.dia]!==1?'s':''}\n`;
      const opcKeys = Object.keys(dayOpciones[d.dia]);
      if (opcKeys.length > 0) {
        opcKeys.forEach(op => {
          msg += `  - ${op}: ${dayOpciones[d.dia][op]}\n`;
        });
        const totalOpc = Object.values(dayOpciones[d.dia]).reduce((a,b)=>a+b,0);
        const sinOpc = dayTotals[d.dia] - totalOpc;
        if (sinOpc > 0) msg += `  - ${d.platoFuerte}: ${sinOpc}\n`;
      }
    }
  });

  msg += `\n*Detalle por persona:*\n`;
  ordersData.forEach(o => {
    const dias = menuData.dias.filter(d => o.detalle[d.dia] > 0).map(d => {
      let txt = d.dia.substring(0,3);
      if (o.opciones && o.opciones[d.dia]) txt += `(${o.opciones[d.dia].substring(0,15)})`;
      return txt;
    }).join(', ');
    msg += `${o.nombre}${o.numEmpleado ? ' #'+o.numEmpleado : ''}: ${dias} (${o.total})\n`;
  });

  window.open(`https://wa.me/?text=${encodeURIComponent(msg)}`, '_blank');
}

// --- ORDERS TABLE ---
function renderOrders() {
  const c = document.getElementById('ordersContainer');
  if (!ordersData.length) { c.innerHTML = '<div class=”no-orders”>Aun no hay pedidos</div>'; return; }

  const dayTotals = {};
  menuData.dias.forEach(d => { dayTotals[d.dia] = 0; });

  // Sort by employee number
  const sorted = [...ordersData].sort((a, b) => {
    const na = parseInt(a.numEmpleado) || 99999;
    const nb = parseInt(b.numEmpleado) || 99999;
    return na - nb;
  });

  let html = '<div class="orders-table-wrap"><table class="orders-table"><thead><tr>';
  html += '<th>No.</th><th>Nombre</th>';
  menuData.dias.forEach(d => {
    const label = d.dia.substring(0,3);
    html += d.platoAlternativo ? `<th>${label} *</th>` : `<th>${label}</th>`;
  });
  html += '<th>Total</th></tr></thead><tbody>';

  sorted.forEach(o => {
    html += '<tr>';
    html += `<td style="font-weight:600;color:var(--primary)">${o.numEmpleado || '-'}</td>`;
    html += `<td>${o.nombre}</td>`;
    menuData.dias.forEach(d => {
      const qty = (o.detalle && o.detalle[d.dia]) || 0;
      dayTotals[d.dia] += qty;
      if (qty === 0) {
        html += '<td style="color:#ccc">-</td>';
      } else if (d.platoAlternativo && o.opciones && o.opciones[d.dia]) {
        const isAlt = o.opciones[d.dia] !== d.platoFuerte;
        const color = isAlt ? '#e67e22' : '#27ae60';
        const icon = isAlt ? '&#9670;' : '&#9671;';
        html += `<td>${icon} ${qty}<br><small style="color:${color};font-size:10px">${o.opciones[d.dia].substring(0,18)}</small></td>`;
      } else {
        html += `<td>${qty}</td>`;
      }
    });
    html += `<td><strong>${o.total}</strong></td></tr>`;
  });

  const gt = Object.values(dayTotals).reduce((a,b)=>a+b,0);
  html += '<tr class="total-row"><td colspan="2">TOTAL</td>';
  menuData.dias.forEach(d => { html += `<td><strong>${dayTotals[d.dia]}</strong></td>`; });
  html += `<td><strong>${gt}</strong></td></tr>`;

  // Option breakdown for days with alternatives
  const daysWithAlt = menuData.dias.filter(d => d.platoAlternativo);
  if (daysWithAlt.length > 0) {
    html += '<tr><td colspan="100%" style="padding:12px 0 4px;font-weight:700;border:none;background:transparent">Desglose por opción:</td></tr>';
    daysWithAlt.forEach(d => {
      const opcCounts = {};
      ordersData.forEach(o => {
        const qty = (o.detalle && o.detalle[d.dia]) || 0;
        if (qty > 0) {
          const opcion = (o.opciones && o.opciones[d.dia]) || d.platoFuerte;
          opcCounts[opcion] = (opcCounts[opcion] || 0) + qty;
        }
      });
      if (Object.keys(opcCounts).length > 0) {
        html += `<tr><td colspan="2" style="font-weight:600">${d.dia}</td><td colspan="100%">`;
        Object.entries(opcCounts).forEach(([opcion, count]) => {
          html += `<span style="display:inline-block;margin-right:16px">${opcion}: <strong>${count}</strong></span>`;
        });
        html += '</td></tr>';
      }
    });
  }

  html += '</tbody></table></div>';
  c.innerHTML = html;
}

function exportarCSV() {
  if (!ordersData.length) { showToast('No hay pedidos'); return; }

  // â”€â”€â”€ Build header â”€â”€â”€
  let csv = 'No. Empleado,Nombre,Fecha de Pedido';
  menuData.dias.forEach(d => {
    if (d.platoAlternativo) {
      csv += `,"${d.dia} (Cant.)","${d.dia} (Platillo)"`;
    } else {
      csv += `,"${d.dia}"`;
    }
  });
  csv += ',Total Semana\n';

  // â”€â”€â”€ Sort orders by employee number â”€â”€â”€
  const sorted = [...ordersData].sort((a, b) => {
    const na = parseInt(a.numEmpleado) || 99999;
    const nb = parseInt(b.numEmpleado) || 99999;
    return na - nb;
  });

  // â”€â”€â”€ Data rows â”€â”€â”€
  sorted.forEach(o => {
    csv += `"${o.numEmpleado || 'S/N'}","${o.nombre}","${new Date(o.fecha).toLocaleDateString('es-MX', {day:'2-digit', month:'2-digit', year:'numeric', hour:'2-digit', minute:'2-digit'})}"`;
    menuData.dias.forEach(d => {
      const qty = (o.detalle && o.detalle[d.dia]) || 0;
      if (d.platoAlternativo) {
        const opcion = (qty > 0 && o.opciones && o.opciones[d.dia]) ? o.opciones[d.dia] : '';
        csv += `,${qty},"${opcion}"`;
      } else {
        csv += `,${qty}`;
      }
    });
    csv += `,${o.total}\n`;
  });

  // â”€â”€â”€ Totals row â”€â”€â”€
  const dayTotals = {};
  menuData.dias.forEach(d => { dayTotals[d.dia] = 0; });
  ordersData.forEach(o => { menuData.dias.forEach(d => { dayTotals[d.dia] += (o.detalle && o.detalle[d.dia]) || 0; }); });
  const gt = Object.values(dayTotals).reduce((a,b) => a+b, 0);
  csv += `"","TOTAL",""`;
  menuData.dias.forEach(d => {
    csv += `,${dayTotals[d.dia]}`;
    if (d.platoAlternativo) csv += `,""`;
  });
  csv += `,${gt}\n`;

  // â”€â”€â”€ Option breakdown rows (for days with alternatives) â”€â”€â”€
  const daysWithAlt = menuData.dias.filter(d => d.platoAlternativo);
  if (daysWithAlt.length > 0) {
    csv += '\n"","DESGLOSE POR OPCION",""\n';
    daysWithAlt.forEach(d => {
      const opcCounts = {};
      ordersData.forEach(o => {
        const qty = (o.detalle && o.detalle[d.dia]) || 0;
        if (qty > 0) {
          const opcion = (o.opciones && o.opciones[d.dia]) || d.platoFuerte;
          opcCounts[opcion] = (opcCounts[opcion] || 0) + qty;
        }
      });
      if (Object.keys(opcCounts).length > 0) {
        csv += `\n"","${d.dia} ${d.fecha}",""\n`;
        Object.entries(opcCounts).forEach(([opcion, count]) => {
          csv += `"","  ${opcion}","${count} comida${count !== 1 ? 's' : ''}"\n`;
        });
      }
    });
  }

  const blob = new Blob(['ï»¿' + csv], { type: 'text/csv;charset=utf-8;' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `pedidos_PROESA_S${menuData.semana}_${menuData.mes}${menuData.anio}.csv`;
  a.click();
  showToast('CSV descargado');
}

async function limpiarPedidos() {
  if (confirm('Borrar todos los pedidos?')) {
    ordersData = [];
    await saveToCloud();
    renderOrders();
    showToast('Pedidos eliminados');
  }
}

function showToast(m) {
  const t = document.getElementById('toast');
  t.textContent = m;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// Auto-refresh orders in admin
setInterval(async () => { if (adminVisible) { await loadFromCloud(); renderOrders(); } }, 30000);

// â”€â”€â”€ INIT â”€â”€â”€
(async () => { await loadFromCloud(); renderMenu(); })();
</script>
