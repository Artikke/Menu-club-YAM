<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>PROESA - QR Menu Semanal</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800;900&family=Inter:wght@300;400;500;600&display=swap');

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Inter', sans-serif;
  background: #f0f4f8;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  padding: 20px;
}

.poster {
  width: 600px;
  background: #ffffff;
  border-radius: 24px;
  overflow: hidden;
  box-shadow: 0 20px 60px rgba(26,82,118,0.15);
}

.poster-header {
  background: linear-gradient(135deg, #1a5276 0%, #0f9b8e 100%);
  padding: 40px 40px 30px;
  text-align: center;
  position: relative;
}

.poster-header::after {
  content: '';
  position: absolute;
  bottom: -20px;
  left: 0; right: 0;
  height: 40px;
  background: #ffffff;
  border-radius: 50% 50% 0 0 / 100% 100% 0 0;
}

.logo-circle {
  width: 90px; height: 90px;
  background: #fff;
  border-radius: 16px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  margin-bottom: 16px;
  box-shadow: 0 8px 24px rgba(0,0,0,0.15);
}

.logo-circle img {
  width: 75px; height: 75px;
  object-fit: contain;
  border-radius: 8px;
}

.poster-title {
  font-family: 'Montserrat', sans-serif;
  font-size: 1.8rem;
  font-weight: 800;
  color: #ffffff;
  letter-spacing: 1px;
  margin-bottom: 4px;
}

.poster-subtitle {
  font-size: 0.95rem;
  color: rgba(255,255,255,0.85);
  font-weight: 400;
  letter-spacing: 3px;
  text-transform: uppercase;
}

.poster-body {
  padding: 30px 40px 20px;
  text-align: center;
}

.scan-text {
  font-family: 'Montserrat', sans-serif;
  font-size: 1.4rem;
  font-weight: 700;
  color: #1a5276;
  margin-bottom: 6px;
}

.scan-desc {
  font-size: 0.95rem;
  color: #7f8c8d;
  margin-bottom: 24px;
  line-height: 1.5;
}

.qr-container {
  display: inline-block;
  padding: 20px;
  background: #ffffff;
  border: 3px solid #0f9b8e;
  border-radius: 20px;
  box-shadow: 0 8px 30px rgba(15,155,142,0.12);
  margin-bottom: 20px;
}

.qr-container canvas {
  display: block;
}

.url-display {
  display: inline-block;
  background: linear-gradient(135deg, #1a5276, #0f9b8e);
  color: #fff;
  padding: 10px 24px;
  border-radius: 25px;
  font-size: 0.8rem;
  font-weight: 600;
  letter-spacing: 0.5px;
  margin-bottom: 10px;
}

.poster-footer {
  background: #f8fafb;
  border-top: 1px solid #ecf0f1;
  padding: 20px 40px;
  text-align: center;
}

.schedule-title {
  font-family: 'Montserrat', sans-serif;
  font-size: 0.85rem;
  font-weight: 700;
  color: #1a5276;
  margin-bottom: 12px;
  text-transform: uppercase;
  letter-spacing: 2px;
}

.schedule-grid {
  display: flex;
  justify-content: center;
  gap: 12px;
  flex-wrap: wrap;
}

.schedule-item {
  display: flex;
  align-items: center;
  gap: 8px;
  background: #fff;
  padding: 8px 14px;
  border-radius: 10px;
  border: 1px solid #ecf0f1;
}

.schedule-icon {
  width: 28px; height: 28px;
  background: linear-gradient(135deg, #1a5276, #0f9b8e);
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  color: #fff;
  font-size: 0.8rem;
}

.schedule-info {
  text-align: left;
}

.schedule-info .label {
  font-size: 0.65rem;
  color: #7f8c8d;
  text-transform: uppercase;
  letter-spacing: 1px;
  font-weight: 600;
}

.schedule-info .time {
  font-size: 0.85rem;
  font-weight: 700;
  color: #1a5276;
}

.poster-bottom {
  background: linear-gradient(135deg, #1a5276 0%, #0f9b8e 100%);
  padding: 14px 40px;
  text-align: center;
}

.poster-bottom p {
  color: rgba(255,255,255,0.8);
  font-size: 0.75rem;
  letter-spacing: 1px;
}

.print-btn {
  position: fixed;
  bottom: 30px;
  right: 30px;
  background: linear-gradient(135deg, #1a5276, #0f9b8e);
  color: #fff;
  border: none;
  padding: 14px 28px;
  border-radius: 30px;
  font-family: 'Montserrat', sans-serif;
  font-size: 1rem;
  font-weight: 700;
  cursor: pointer;
  box-shadow: 0 8px 24px rgba(26,82,118,0.3);
  transition: transform 0.2s;
}
.print-btn:hover { transform: scale(1.05); }

@media print {
  body { background: #fff; padding: 0; }
  .poster { box-shadow: none; border-radius: 0; width: 100%; max-width: 600px; }
  .print-btn { display: none; }
}
</style>
</head>
<body>

<div class="poster">
  <div class="poster-header">
    <div class="logo-circle">
      <img src="logo.jpg" alt="PROESA" />
    </div>
    <div class="poster-title">PROESA</div>
    <div class="poster-subtitle">Soluciones en Salud</div>
  </div>

  <div class="poster-body">
    <div class="scan-text">Escanea para pedir tu comida</div>
    <div class="scan-desc">Abre la camara de tu celular y apunta al codigo QR</div>
    <div class="qr-container" id="qrBox">
      <div id="qrLoading" style="width:250px;height:250px;display:flex;align-items:center;justify-content:center;color:#7f8c8d;">Cargando QR...</div>
    </div>
    <br/>
    <div class="url-display">artikke.github.io/Menu-club-YAM</div>
  </div>

  <div class="poster-footer">
    <div class="schedule-title">Horario de pedidos</div>
    <div class="schedule-grid">
      <div class="schedule-item">
        <div class="schedule-icon">&#9749;</div>
        <div class="schedule-info">
          <div class="label">Pedir</div>
          <div class="time">7:00 - 10:00 AM</div>
        </div>
      </div>
      <div class="schedule-item">
        <div class="schedule-icon">&#10060;</div>
        <div class="schedule-info">
          <div class="label">Cancelar</div>
          <div class="time">Hasta las 10:00 AM</div>
        </div>
      </div>
      <div class="schedule-item">
        <div class="schedule-icon">&#127769;</div>
        <div class="schedule-info">
          <div class="label">Dia siguiente</div>
          <div class="time">5:00 PM - 12:00 AM</div>
        </div>
      </div>
    </div>
  </div>

  <div class="poster-bottom">
    <p>LUNES A VIERNES &bull; MENU SEMANAL</p>
  </div>
</div>

<button class="print-btn" onclick="window.print()">Imprimir</button>

<script>
// Generar QR con API, fallback a segunda API
const qrUrl = 'https://artikke.github.io/Menu-club-YAM/';
const box = document.getElementById('qrBox');
const img = new Image();
img.width = 250; img.height = 250;
img.alt = 'QR Code';
img.style.display = 'block';
img.onload = function() { box.innerHTML = ''; box.appendChild(img); };
img.onerror = function() {
  // Fallback API
  const img2 = new Image();
  img2.width = 250; img2.height = 250;
  img2.alt = 'QR Code';
  img2.style.display = 'block';
  img2.onload = function() { box.innerHTML = ''; box.appendChild(img2); };
  img2.onerror = function() {
    document.getElementById('qrLoading').textContent = 'Visita: artikke.github.io/Menu-club-YAM';
  };
  img2.src = 'https://chart.googleapis.com/chart?chs=250x250&cht=qr&chl=' + encodeURIComponent(qrUrl);
};
img.src = 'https://api.qrserver.com/v1/create-qr-code/?size=250x250&data=' + encodeURIComponent(qrUrl);
</script>
</body>
</html>
